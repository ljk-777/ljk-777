name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=%2300F5A0&color_dots=%23161B22,%2312324A,%231D5B7A,%2322A2C3,%237AF0FF
            dist/github-snake-dark.svg?palette=github-dark&color_snake=%2300F5A0&color_dots=%230B0F14,%2312324A,%231D5B7A,%2322A2C3,%237AF0FF

      - name: Publish snake animation
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: ./dist
