<svg width="920" height="170" viewBox="0 0 920 170" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Terminal metrics panel</title>
  <desc id="desc">Minimal terminal-style metrics panel for profile summary.</desc>
  <rect width="920" height="170" rx="18" fill="#0B0F14"/>
  <rect x="16" y="16" width="888" height="138" rx="12" fill="#0F141B" stroke="#213040"/>
  <rect x="16" y="16" width="888" height="22" rx="12" fill="#111A23"/>
  <circle cx="38" cy="27" r="3.5" fill="#FF5F57"/>
  <circle cx="52" cy="27" r="3.5" fill="#FEBB2E"/>
  <circle cx="66" cy="27" r="3.5" fill="#28C840"/>
  <text x="84" y="31" fill="#6B879C" font-family="'JetBrains Mono', monospace" font-size="11">ljk@github: ~/system.metrics</text>

  <text x="40" y="66" fill="#7AF0FF" font-family="'JetBrains Mono', monospace" font-size="14">$ watch -n 1 system.metrics</text>
  <text x="40" y="94" fill="#B5C8D6" font-family="'JetBrains Mono', monospace" font-size="14">render.status      stable</text>
  <text x="40" y="116" fill="#B5C8D6" font-family="'JetBrains Mono', monospace" font-size="14">profile.mode       terminal-first</text>
  <text x="40" y="138" fill="#B5C8D6" font-family="'JetBrains Mono', monospace" font-size="14">featured.target    transskill</text>

  <rect x="586" y="56" width="286" height="72" rx="10" fill="#0B0F14" stroke="#213040"/>
  <text x="606" y="80" fill="#6B879C" font-family="'JetBrains Mono', monospace" font-size="11">activity.stream</text>
  <text x="606" y="104" fill="#00F5A0" font-family="'JetBrains Mono', monospace" font-size="14">build.log + snake + featured projects</text>
</svg>
