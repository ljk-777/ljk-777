<svg width="920" height="190" viewBox="0 0 920 190" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Profile metrics panel</title>
  <desc id="desc">Stable local metrics panel with terminal-style summaries for focus, build log, and status.</desc>
  <defs>
    <linearGradient id="panel" x1="40" y1="24" x2="880" y2="166" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B0F14"/>
      <stop offset="0.55" stop-color="#10202D"/>
      <stop offset="1" stop-color="#12324A"/>
    </linearGradient>
    <linearGradient id="line" x1="78" y1="0" x2="842" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00F5A0" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#7AF0FF"/>
      <stop offset="1" stop-color="#00F5A0" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect x="12" y="12" width="896" height="166" rx="22" fill="url(#panel)" stroke="#214156"/>
  <rect x="12" y="12" width="896" height="24" rx="22" fill="#0F1821"/>
  <rect x="12" y="24" width="896" height="1" fill="url(#line)"/>

  <circle cx="38" cy="24" r="4.5" fill="#FF5F57"/>
  <circle cx="54" cy="24" r="4.5" fill="#FEBB2E"/>
  <circle cx="70" cy="24" r="4.5" fill="#28C840"/>

  <text x="88" y="28" fill="#7C97AA" font-family="'JetBrains Mono', monospace" font-size="12">ljk@github: ~/system.metrics</text>

  <text x="40" y="64" fill="#7AF0FF" font-family="'JetBrains Mono', monospace" font-size="14">$ watch -n 1 system.metrics</text>

  <text x="40" y="92" fill="#00F5A0" font-family="'JetBrains Mono', monospace" font-size="13">focus.signal</text>
  <text x="40" y="114" fill="#E5F0FF" font-family="'JetBrains Mono', monospace" font-size="15">transskill / practical AI / product workflows</text>

  <text x="40" y="146" fill="#7AF0FF" font-family="'JetBrains Mono', monospace" font-size="13">public.log</text>
  <text x="40" y="168" fill="#A9C1D1" font-family="'JetBrains Mono', monospace" font-size="15">build.log + contribution snake + featured projects</text>

  <rect x="600" y="70" width="268" height="82" rx="16" fill="#0E161E" stroke="#214156"/>
  <text x="622" y="96" fill="#6E889B" font-family="'JetBrains Mono', monospace" font-size="12">render.status</text>
  <text x="622" y="122" fill="#00F5A0" font-family="'JetBrains Mono', monospace" font-size="16">stable local assets online</text>
  <text x="622" y="144" fill="#A9C1D1" font-family="'JetBrains Mono', monospace" font-size="13">replaced slow external stats + banner</text>
</svg>
