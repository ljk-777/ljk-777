<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ljk terminal mode banner</title>
  <desc id="desc">A futuristic terminal inspired banner with grid lines, glowing accents, and system status text.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1120" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B0F14"/>
      <stop offset="0.45" stop-color="#10202D"/>
      <stop offset="0.75" stop-color="#12324A"/>
      <stop offset="1" stop-color="#0B0F14"/>
    </linearGradient>
    <linearGradient id="glowLine" x1="146" y1="0" x2="1054" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00F5A0" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00F5A0"/>
      <stop offset="1" stop-color="#7AF0FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="240" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00F5A0"/>
      <stop offset="1" stop-color="#7AF0FF"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#173246" stroke-opacity="0.55" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="28" fill="url(#grid)"/>

  <g opacity="0.9">
    <path d="M72 74H248" stroke="#1D5B7A" stroke-width="1.5"/>
    <path d="M72 250H1118" stroke="#173246" stroke-width="1"/>
    <path d="M922 68H1124" stroke="#173246" stroke-width="1"/>
    <path d="M922 92H1062" stroke="#173246" stroke-width="1"/>
  </g>

  <rect x="54" y="46" width="1092" height="228" rx="20" fill="#0B0F14" fill-opacity="0.78" stroke="#214156" stroke-width="1.2"/>
  <rect x="54" y="46" width="1092" height="24" rx="20" fill="#0F1821"/>
  <rect x="54" y="58" width="1092" height="1" fill="url(#glowLine)" filter="url(#softGlow)"/>

  <circle cx="82" cy="58" r="4.5" fill="#FF5F57"/>
  <circle cx="98" cy="58" r="4.5" fill="#FEBB2E"/>
  <circle cx="114" cy="58" r="4.5" fill="#28C840"/>

  <text x="136" y="62" fill="#7C97AA" font-family="'JetBrains Mono', monospace" font-size="12">ljk@github: ~/terminal-mode</text>
  <text x="930" y="62" fill="#00F5A0" font-family="'JetBrains Mono', monospace" font-size="12">STATUS: ONLINE</text>

  <g filter="url(#softGlow)">
    <path d="M888 126L1042 126" stroke="url(#accent)" stroke-width="2"/>
    <path d="M930 104L930 148" stroke="#1D5B7A" stroke-width="1.5"/>
    <circle cx="1002" cy="126" r="34" stroke="#1D5B7A" stroke-width="1.5"/>
    <circle cx="1002" cy="126" r="18" fill="url(#accent)" fill-opacity="0.14" stroke="#7AF0FF" stroke-width="1.5"/>
  </g>

  <text x="88" y="118" fill="#7AF0FF" font-family="'JetBrains Mono', monospace" font-size="14">$ boot --profile ljk</text>
  <text x="88" y="152" fill="#E5F0FF" font-family="'JetBrains Mono', monospace" font-size="38" font-weight="700">future-facing terminal mode</text>
  <text x="88" y="184" fill="#91A8B8" font-family="'JetBrains Mono', monospace" font-size="16">AI / vision / product systems / useful experiments</text>

  <g fill="#A9C1D1" font-family="'JetBrains Mono', monospace" font-size="14">
    <text x="88" y="228">&gt; building through projects</text>
    <text x="88" y="252">&gt; exploring practical ML workflows</text>
    <text x="88" y="276">&gt; shipping cleaner public demos</text>
  </g>

  <g>
    <rect x="884" y="186" width="214" height="54" rx="12" fill="#0E161E" stroke="#214156" stroke-width="1"/>
    <text x="904" y="208" fill="#6E889B" font-family="'JetBrains Mono', monospace" font-size="12">system.metrics</text>
    <text x="904" y="228" fill="#00F5A0" font-family="'JetBrains Mono', monospace" font-size="15">online / building / iterating</text>
  </g>
</svg>
